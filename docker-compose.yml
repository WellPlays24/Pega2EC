services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    env_file:
      - .env.example
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./Backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
